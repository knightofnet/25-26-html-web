<!DOCTYPE html>
<html lang="fr">

<head>
    <title>Travail sur le formulaire</title>
    <meta charset="utf-8">
    <!-- Cette balise permet d'assurer que la page s'affiche correctement sur tous les appareils -->
    <meta name="viewport" content="width=device-width, initial-scale=1">
</head>

<body>

    <form method="post" action="ficVide.php">
        <fieldset>

            <div>
                <label for="note">Votre note :</label>
                <select id="note" name="note" required>
                    <option value="">--Choisissez une note--</option>
                    <option value="1">1 étoile</option>
                    <option value="2">2 étoiles</option>
                    <option value="3">3 étoiles</option>
                    <option value="4">4 étoiles</option>
                    <option value="5">5 étoiles</option>
                </select>
            </div>


            <div>
                <label for="comment">Votre commentaire :</label>
                <br>
                <textarea id="comment" name="comment" rows="4" placeholder="Écrivez votre commentaire ici..."
                    required></textarea>
            </div>

            <div>
                <label for="email">Votre adresse email :</label>
                <input type="email" id="email" name="email" required>
            </div>

            <div>
                <label for="captcha">Vérification anti-robots :</label>
                <input type="text" id="captcha" name="captcha" required
                    placeholder="Combien font 3 + 4 ? Réponse au format 000,00" pattern="[\d]{1,3},[\d]{2}">

                <!-- avec une phrase d'indication après le champ de saisie -->
                <p>Veuillez entrer le résultat de l'addition : 3 + 4 = ? avec deux chiffres après la virgule
                </p>

            </div>

            <div>
                <button type="submit">Envoyer</button>
            </div>

        </fieldset>
    </form>

</body>

</html>
